<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app">
        <div class="screen active">
            <div class="login-wrap">
                <div class="login-logo">Kanban</div>
                <div class="login-card">
                    <div class="login-title">Entrar na sua conta</div>
                    <form th:action="@{/login}" method="POST">
                        <div class="field">
                            <label>Usuário</label>
                            <input type="text" name="usuario" placeholder="seu usuário" autocomplete="off" required>
                        </div>
                        <div class="field">
                            <label>Senha</label>
                            <input type="password" name="senha" placeholder="sua senha" required>
                        </div>
                        <button type="submit" class="btn-primary">Entrar</button>
                        <div class="login-error" th:if="${erro}" th:text="${erro}"></div>
                    </form>
                    <div class="login-hint">
                        Admin: <strong>admin</strong> / admin123<br>
                        Equipe: Veja no painel admin / senha123
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
