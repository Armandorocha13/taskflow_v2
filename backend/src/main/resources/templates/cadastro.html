<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban — Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="app">
        <div class="screen active">
            <div class="login-wrap">
                <div class="login-logo">Kanban</div>
                <div class="login-card">
                    <div class="login-title">Criar nova conta Admin</div>
                    <form th:action="@{/cadastro}" method="POST">
                        <div class="field">
                            <label>Nome Completo</label>
                            <input type="text" name="nome" placeholder="seu nome" required>
                        </div>
                        <div class="field">
                            <label>Usuário</label>
                            <input type="text" name="usuario" placeholder="seu usuário" autocomplete="off" required>
                        </div>
                        <div class="field">
                            <label>Senha</label>
                            <input type="password" name="senha" placeholder="sua senha" required>
                        </div>
                        <input type="hidden" name="tipo" value="ADMIN">
                        <button type="submit" class="btn-primary">Criar Conta</button>
                    </form>
                    <div style="margin-top: 15px; text-align: center;">
                        <a th:href="@{/login}" style="color: var(--blue); font-size: 13px; text-decoration: none;">Já tenho uma conta. Entrar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
